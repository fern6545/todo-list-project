<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/45c5cf9baf.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <title>My to-do list</title>
</head>
<body>

    <div class="container">

        <header class="text-center text-light my-4">
            <h1 class="mb-4">fern's<br>To do List</h1>
            <form class="search">
                <p class="my-0">Search the list</p>
                <input class="form-control m-auto" type="text" name="search" placeholder="Search..."/>
            </form>
        </header>

        <ul class="list-group todos mx-auto text-light">

        </ul>

        <form class="add text-center my-4">
            <label class="text-light">Add new todo to the list</label>
            <input class="form-control m-auto" type="text" name="add"/>
        </form>


    </div>


    <script src="app.js"></script>
</body>
</html>
